<!DOCTYPE html>
<html>
<head>
    <!-- Google Barcode Font -->
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+128&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .barcode-label {
            width: 300px;
            border: 1px solid #000;
            padding: 15px;
        }

        .product-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .sku {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .price {
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }

        .barcode {
            font-family: 'Libre Barcode 128', cursive;
            font-size: 60px;
            text-align: center;
            margin-top: 10px;
            line-height: 1;
        }

        .barcode-number {
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="barcode-label">
        <div class="product-name">{{productName}}</div>
        <div class="sku">SKU: {{sku}}</div>
        <div>Batch: {{batchNo}}</div>

        <div class="price">₹ {{price}}</div>

        <!-- Barcode using font -->
        <div class="barcode">
            {{barcodeValue}}
        </div>

        <!-- Human readable number -->
        <div class="barcode-number">
            {{barcodeValue}}
        </div>
    </div>
</body>
</html>
