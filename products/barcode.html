<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .barcode-label {
            width: 300px;
            border: 1px solid #000;
            padding: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-code {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .price {
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        .barcode {
            text-align: center;
            margin-top: 15px;
        }

        .barcode img {
            max-width: 100%;
            height: 80px;
        }

        .barcode-number {
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="barcode-label">
        <div class="product-name">{{productName}}</div>
        <div class="product-code">SKU: {{sku}}</div>

        <div>Category: {{category}}</div>
        <div>Batch: {{batchNo}}</div>

        <div class="price">₹ {{price}}</div>

        <div class="barcode">
            <!-- If you generate barcode as image -->
            <img src="{{barcodeImageUrl}}" alt="Barcode" />

            <!-- Or if using barcode font -->
            <!-- <div class="barcode-number">{{barcodeNumber}}</div> -->
        </div>
    </div>
</body>
</html>
