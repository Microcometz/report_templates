<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fff;
        }

        .label-page {
            display: flex;
            flex-wrap: wrap;
            gap: 2mm;
            padding: 3mm;
        }

        .barcode-label {
            width: 76.2mm;
            height: 25.4mm;
            border: 0.5pt solid #666;
            padding: 1mm 2mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #fff;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .label-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .product-name {
            font-size: 6pt;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
        }

        .price {
            font-size: 7pt;
            font-weight: bold;
            white-space: nowrap;
        }

        .label-meta {
            display: flex;
            justify-content: space-between;
            font-size: 4.5pt;
            color: #333;
            margin-top: 0.3mm;
        }

        .barcode-img {
            display: block;
            width: 100%;
            height: 11mm;
            object-fit: contain;
            object-position: center;
            margin: 0.5mm 0 0.2mm 0;
        }

        .barcode-number {
            text-align: center;
            font-size: 5pt;
            letter-spacing: 1px;
        }

        @media print {
            body {
                margin: 0;
            }

            .label-page {
                padding: 3mm;
                gap: 2mm;
            }
        }
    </style>
</head>

<body>
    <div class="label-page">
        {{#each items}}
        <div class="barcode-label">
            <div class="label-top">
                <div class="product-name">{{this.productName}}</div>
                <div class="price">&#8377;{{this.price}}</div>
            </div>
            <div class="label-meta">
                <span>SKU: {{this.sku}}</span>
                <span>Batch: {{this.batchNo}}</span>
            </div>
            <img class="barcode-img" src="data:image/png;base64,{{lookup ../barcodes this.barcodeKey}}" alt="barcode" />
            <div class="barcode-number">{{this.barcodeValue}}</div>
        </div>
        {{/each}}
    </div>
</body>

</html>
